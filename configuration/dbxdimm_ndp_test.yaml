Frontend:
  impl: LoadStoreNCoreTrace
  clock_ratio: 1
  num_cores: 1
  debug_mode: false
  max_inst: 5000000000

  # core0_trace: "../spec_trace/470.lbm"
  core0_trace: "./generated_traces_p/exp1_base_standalone/pch_ndp/pch_ndp_x4_64K_GEMV.txt"
  core0_mshr_size: 32
  core0_is_ndp_trace: false
  core0_repeat: 1

  Translation:
    impl: NoTranslation
    max_addr: 2147483648

MemorySystem:
  impl: ndpDRAM
  clock_ratio: 1
  trace_core_enable: false
  trace_ndp_type: false
  trace_path: "generated_traces/exp1_base_standalone/pch_ndp/pch_ndp_x4_8K_GEMV.txt"
  trace_core_mshr_size: 32

  DRAM:
    impl: DDR5-pCH
    org:
      preset: DDR5_16Gb_DBX_x4
      channel: 2
      pseudochannel: 4
      rank: 1
      dq: 4
      real_dq: 4
      io_boost: 1
    timing:
      preset: DDR5_4800B
    RFM:
      BRC: 0
    drampower_enable: true
    power_debug: false
    use_db_fetch: true
    ndp_inst_slot: 8
    voltage:
      preset: Default
    current:
      preset: DDR5_4800x4

  Controller:
    impl: ndpDRAMCtrl
    Scheduler:
      impl: NDPFRFCFS
    RefreshManager:
      impl: DR5CHAllBank
    RowPolicy:
      impl: ClosedRowPolicyPch
      cap: 128
    plugins:
    adaptive_row_cap: 8
    ndp_wr_max_age: 256
    ndp_wr_mode_min_time: 128
    dram_rd_mode_min_time: 128
    abs_ndp_high_threshold: 0.25
    ndp_read_high_threshold: 0.125
    ndp_write_high_threshold: 0.125
    ndp_read_low_threshold: 0
    ndp_write_low_threshold: 0
    ndp_req_per_bank: 1
    m_ndp_row_hit_low_cap: 1
    pre_rw_per_token: 1
    target_ndp_ratio: 2
    prefetch_buffer_size: 8

  AddrMapper:
    impl: RoRaBkBgCoPcCh
