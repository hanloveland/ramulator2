Frontend:
  impl: LoadStoreNCoreTrace
  clock_ratio: 1
  num_cores: 1
  debug_mode: false
  # max_inst: 500000
  max_inst: 500000000
  # max_inst: 5000
  
  core0_trace: "./trace/pch_ndp/pch_ndp_x4_512K_DOT.txt"
  # core0_trace: "./trace/pch_non_ndp/pch_non_ndp_x4_8K_AXPY.txt"
  # Core 0: NDP unit with high memory bandwidth
  # core0_trace: "./trace/pch_ndp/pch_ndp_x4_128K_GEMV.txt"
  # core0_trace: "./op1_trace/pch_non_ndp/pch_non_ndp_x4_128K_GEMV.txt"
  # core0_trace: "../spec_trace/403.gcc"
  core0_mshr_size: 32  # Large MSHR for high bandwidth
  core0_is_ndp_trace: true
  core0_repeat: 1
  
  # Core 1: CPU core with moderate memory access
  core1_trace: "../spec_trace/470.lbm"
  core1_mshr_size: 32  # Standard MSHR size
  core1_is_ndp: false
  core1_repeat: 1

  # Core 0: NDP unit with high memory bandwidth
  core2_trace: "../spec_trace/437.leslie3d"
  core2_mshr_size: 32  # Large MSHR for high bandwidth
  core2_is_ndp_trace: false
  core2_repeat: 1
  
  # Core 1: CPU core with moderate memory access
  core3_trace: "../spec_trace/401.bzip2"
  core3_mshr_size: 32  # Standard MSHR size
  core3_is_ndp: false
  core3_repeat: 1

  Translation:
    impl: NoTranslation
    max_addr: 2147483648
              

MemorySystem:
  impl: ndpDRAM
  clock_ratio: 1
  trace_core_enable: false
  trace_ndp_type: false
  trace_path: "./trace/pch_ndp/pch_ndp_x4_128K_GEMV.txt"
  # trace_path: "./trace/pch_non_ndp/pch_non_ndp_x4_8K_AXPY.txt"
  # trace_path: "./trace/pch_non_ndp/pch_non_ndp_x4_128K_GEMV.txt"
  # trace_path: "./bk_split_trace/pch_ndp/pch_ndp_x4_128K_GEMV.txt"
  # trace_path: "./linear_access_trace/pch_ndp/pch_ndp_x4_128K_GEMV.txt"
  # trace_path: "./linear_access_trace/pch_non_ndp/pch_non_ndp_x4_128K_GEMV.txt"
  # trace_path: "./trace/pch_non_ndp/pch_non_ndp_x4_8K_DOT.txt"
  trace_core_mshr_size: 32

  DRAM:
    impl: DDR5-pCH
    org:
      # DBX Preset: DDR5_16Gb_x4, DDR5_16Gb_x8, DDR5_16Gb_x16 
      preset: DDR5_16Gb_DBX_x4
      channel: 2
      pseudochannel : 4
      rank: 1
      # DRAM DQs on DIMM-side: 4, 8, 16  
      dq: 4
      real_dq: 4
      # IO Freqeucny Boost: 1 2, 4
      io_boost: 1
    timing:
      # DDR5_4800B, DDR5_8000AN
      preset: DDR5_4800B 
    RFM:
      BRC: 0  
    drampower_enable: true
    power_debug: false
    use_db_fetch: true
    ndp_inst_slot: 8
    voltage:
      preset: Default
    current:
      # DBX preset: DDR5_4800x4, DDR5_4800x8, DDR5_4800x16
      preset: DDR5_4800x4

  Controller:
    impl: ndpDRAMCtrl
    Scheduler:
      impl: NDPFRFCFS
    RefreshManager:
      impl: DR5CHAllBank
    RowPolicy:
      # impl: OpenRowPolicy
      impl: ClosedRowPolicyPch
      cap: 128
    plugins:
    adaptive_row_cap: 8
    ndp_wr_max_age: 256
    ndp_wr_mode_min_time: 128
    dram_rd_mode_min_time: 128
    abs_ndp_high_threshold: 0.25
    ndp_read_high_threshold: 0.125
    ndp_write_high_threshold: 0.125
    ndp_read_low_threshold: 0
    ndp_write_low_threshold: 0
    ndp_req_per_bank: 1
    m_ndp_row_hit_low_cap: 1
    pre_rw_per_token: 1
    target_ndp_ratio: 2
    prefetch_buffer_size: 8

  AddrMapper:
    # impl: RoRaCoBaPcCh
    impl: RoRaBkBgCoPcCh
    # impl: BhRoRaBlBgCoPcCh
    # impl: RoRabkCoBgPcCh    
    # impl: RoBaRaCoPcCh
    # impl: RoCoBaRaPcCh
    # impl: BkRoCoBgRaPcCh
    
